<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />

<title>Appu Murugan | Marketing Ops Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,700;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#fafaf8;color:#1a1a1a;font-family:'DM Sans','Helvetica Neue',sans-serif}
::selection{background:#b83a2a;color:#fff}
.fade-in{animation:fadeIn .5s ease-out both}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.nav-item{cursor:pointer;padding:9px 0;border-left:2px solid transparent;padding-left:14px;transition:all .2s;font-size:13px;color:#777}
.nav-item:hover{color:#333;border-left-color:#ccc}
.nav-item.active{color:#b83a2a;border-left-color:#b83a2a;font-weight:600}
.work-item{cursor:pointer;padding:14px 16px;border-bottom:1px solid #eee;transition:all .15s}
.work-item:hover{background:#f5f4f0}
.work-item.expanded{background:#f5f4f0}
.tag{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.12em;color:#b83a2a;font-weight:500}

.nav-sidebar{display:flex;overflow-x:auto;gap:0;border-bottom:1px solid #e8e6e0;margin-bottom:20px}
.nav-sidebar .nav-item{border-left:none;border-bottom:2px solid transparent;padding:8px 14px;white-space:nowrap;font-size:11px}

</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;

  {
    id: "dashboards",
    tag: "DASHBOARDS & REPORTING",
    title: "Built 5 Looker Studio Dashboards from Scratch",
    context: "The growth team had no centralized view of marketing performance. Reporting was manual, inconsistent, and scattered across HubSpot reports and spreadsheets. Leadership couldn't answer basic questions like \"which channel drives the most revenue?\" without asking someone to pull data.",

      { name: "SEO Dashboard (GSC + GA4)", detail: "Combines Google Search Console data with GA4 to track impressions (8.92M), clicks (15.9K), keyword position buckets, page-level performance, and AI referral traffic (ChatGPT, Perplexity, Gemini, Claude). Built country-level click distribution and bucket-wise keyword trend analysis." },

      { name: "Marketing Funnel Dashboard", detail: "Contact-to-deal level funnel tracking \u2014 MQL \u2192 SAL \u2192 Open Deals \u2192 Won/Customer. Monthly, region, campaign, and channel cohort tables with full pipeline and ARR metrics. Built with blended HubSpot data sources." },
    ],
    tools: ["Looker Studio", "BigQuery", "GA4", "Google Search Console", "HubSpot"],
    impact: "Reduced reporting time from hours to real-time. Growth team now self-serves data instead of requesting ad-hoc pulls.",
  },
  {
    id: "automation",
    tag: "AI & AUTOMATION",
    title: "Designed and Deployed 9 n8n Automation Agents",
    context: "AEs were spending time on junk leads. Outbound lists included existing customers. Lead categorization (MSP vs IT) was manual and inconsistent. There was no systematic way to catch leads that fell through the cracks.",

                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
